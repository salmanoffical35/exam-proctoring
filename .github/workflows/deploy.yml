name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (OpenCV)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl1 libglib2.0-0 libsm6 libxext6 libxrender-dev

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key

  # ── Frontend Build ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

  # ── Deploy Backend to Hugging Face Space ──────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Hugging Face)
    needs: backend-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone HF Space repo
          git clone https://salmanoffical35:$HF_TOKEN@huggingface.co/spaces/salmanoffical35/exam-proctoring-api hf_space

          # Sync backend files to HF Space (keep HF-specific files)
          rsync -av --exclude='.git' backend/ hf_space/

          # Commit and push if anything changed
          cd hf_space
          git add .
          git diff --staged --quiet || git commit -m "Deploy: ${{ github.sha }}"
          git push
        # Add HF_TOKEN secret in GitHub:
        # Settings → Secrets → Actions → New secret
        # Name: HF_TOKEN
        # Value: your Hugging Face token (hf_xxxx)

  # ── Deploy Frontend (Vercel auto-deploys via GitHub integration) ──────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: frontend-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Vercel auto-deploy confirmation
        run: |
          echo "✅ Vercel detects GitHub push automatically."
          echo "✅ Frontend will be deployed by Vercel's GitHub integration."
          echo "✅ No manual action needed."
